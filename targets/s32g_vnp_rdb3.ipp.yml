# Target for the NXP S32G3 Vehicle Networking Reference Design Board
version: '2'
mpp-vars:
  target_supported_arches:
    - aarch64
  consoles: 'ttyLF0,115200'
  partition_label: dos
  use_efi_runtime: false
  kernel_opts:
    mpp-join:
      - mpp-eval: kernel_opts
      - - acpi=off
        # Without this, the kernel doesn't boot, possibly related to EFI usage.
        # See:
        #
        #     https://community.nxp.com/t5/S32G/s32g3-kernel-configuration-item-clarification/m-p/2188368
        #
        - cma=256M@0xf0000000
  dracut_drivers:
    mpp-join:
      - mpp-eval: dracut_drivers
      - - "mmc_block"
        - "sdhci-esdhc-imx"
  dracut_modules:
    - "base"
    - "bash"
    - "dracut-systemd"
    - "fs-lib"
    - "kernel-modules"
    - "rootfs-block"
    - "shutdown"
    - "systemd"
    - "systemd-initrd"
    - "terminfo"
    - "udev-rules"

pipelines: []
