# Implementation of ridesx4_scmi.ipp.yml, but loaded after derived target
version: "2"
mpp-vars:
  kernel_package: kernel-ivos-qualcomm
  use_debug_kernel:
    mpp-eval: "'debug' in locals().get('kernel_package')"

  target_rpms:
    mpp-join:
      - mpp-eval: target_rpms
      - mpp-if: use_debug_kernel
        then:
          - downstream-dtbs-debug
          - kmod-qcom-scmi-debug
        else:
          - downstream-dtbs
          - kmod-qcom-scmi
