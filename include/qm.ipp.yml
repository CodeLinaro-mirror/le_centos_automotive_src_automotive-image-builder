version: '2'

pipelines:
  - name: qm_rootfs_base
    build: name:build
    stages:
      # Initialize systemd-sysusers, /etc/passwd and /etc/group either
      # with the static base content (to avoid dynamic uid allocations
      # changing between versions)
      - type: org.osbuild.mkdir
        options:
          paths:
            mpp-join:
              - - path: /etc
                - path: /usr
                - path: /usr/lib
                - path: /usr/lib/sysusers.d
                - path: /etc/systemd/system.conf.d
                  parents: true
                  exist_ok: true
              - mpp-eval: |
                  [
                    {
                      'path': f'/usr/lib/systemd/system/{service}.d',
                      'parents': True,
                      'exist_ok': True
                    } for service in qm_image_services_skipped_on_rootless_container
                  ]
      - type: org.osbuild.copy
        inputs:
          data-tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - "name:data"
          inlinefile:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-embed:
              id: qm_skip_on_rootless_dropin_file
              text: $qm_skip_on_rootless_dropin
          inlinefile2:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-embed:
              id: qm-systemd-manager.conf
              text: $qm_systemd_manager_conf
        options:
          paths:
            mpp-join:
              - - from: input://data-tree/etc/passwd
                  to: tree:///etc/passwd
                - from: input://data-tree/etc/group
                  to: tree:///etc/group
                - from: input://data-tree/usr/lib/sysusers.d/00-base-users.conf
                  to: tree:///usr/lib/sysusers.d/00-base-users.conf
                - from:
                    mpp-format-string: input://inlinefile2/{embedded['qm-systemd-manager.conf']}
                  to: tree:///etc/systemd/system.conf.d/00-host.conf
              - mpp-eval: |
                  [
                    {
                      'from': f'input://inlinefile/{embedded["qm_skip_on_rootless_dropin_file"]}',
                      'to': f'tree:///usr/lib/systemd/system/{service}.d/10-container.conf'
                    } for service in qm_image_services_skipped_on_rootless_container
                  ]

      - type: org.osbuild.systemd-sysusers

      - type: org.osbuild.rpm
        options:
          gpgkeys:
            - mpp-eval: distro_gpg_keys
          disable_dracut: true
        inputs:
          packages:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-depsolve:
              architecture: $arch
              ignore-weak-deps: true
              module-platform-id: $distro_module_id
              baseurl: $distro_baseurl/BaseOS/$arch/os/
              root-dir: $distro_root_dir
              releasever: $distro_version
              enabled-repo-ids:
                mpp-if: distro_enabled_repo_ids
                then:
                  mpp-eval: distro_enabled_repo_ids
              repos:
                mpp-join:
                  - mpp-eval: image_repos
                  - mpp-eval: extra_repos
                  - mpp-eval: qm_simple_repos
                  - mpp-if: qm_simple_add_devel_repos
                    then:
                      mpp-eval: image_devel_repos
                  - mpp-if: qm_simple_add_debug_repos
                    then:
                      mpp-eval: image_debug_repos
                  - mpp-eval: qm_extra_repos
              packages:
                mpp-join:
                  - mpp-eval: qm_simple_rpms
                  - mpp-eval: qm_extra_rpms
                  - - systemd
                    - podman
                    - selinux-policy-$selinux_policy
                    - procps-ng
                  - mpp-if: qm_wayland_enable
                    then:
                      - qm-oci-hooks
                      - qm-wayland

      - type: org.osbuild.copy
        inputs:
          inlinefile:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-embed:
              id: qm_subuid
              text: $qm_subuid_content
          inlinefile2:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-embed:
              id: qm_subgid
              text: $qm_subgid_content
        options:
          paths:
            - from:
                mpp-format-string: input://inlinefile/{embedded['qm_subuid']}
              to: tree:///etc/subuid
            - from:
                mpp-format-string: input://inlinefile2/{embedded['qm_subgid']}
              to: tree:///etc/subgid

      - type: org.osbuild.containers.storage.conf
        options:
          filename:
            mpp-format-string: "{containers_configdir}/storage.conf"
          config:
            storage:
              transient_store:
                mpp-eval: containers_transient_store
              options:
                additionalimagestores:
                  - mpp-if: use_qm_containers_extra_store
                    then:
                      mpp-eval: qm_containers_extra_store

      - mpp-if: qm_wayland_enable
        then:
          type: org.osbuild.skopeo
          inputs:
            images:
              type: org.osbuild.containers
              origin: org.osbuild.source
              mpp-resolve-images:
                images:
                  mpp-eval: _qm_containers
          options:
            destination:
              type: containers-storage
              storage-path:
                mpp-eval: qm_containers_extra_store

      - type: org.osbuild.lorax-script
        options:
          path: auto/remove
          product:
            name:
              mpp-format-string: /etc/selinux/{selinux_policy}/contexts/files/*

      - type: org.osbuild.copy
        inputs:
          tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - name:build
        options:
          paths:
            - from: input://tree/usr/share/qm/contexts
              to: tree:///usr/share/containers/selinux/
            - from: input://tree/usr/share/qm/file_contexts
              to:
                mpp-format-string: tree:///etc/selinux/{selinux_policy}/contexts/files/
            - from: input://tree/usr/share/qm/containers.conf
              to:
                mpp-format-string: "tree://{containers_configdir}/containers.conf"

      - type: org.osbuild.lorax-script
        options:
          path: auto/remove
          product:
            name: /var/lib/selinux

      - type: org.osbuild.locale
        options:
          language:
            mpp-eval: locale

      - type: org.osbuild.timezone
        options:
          zone:
            mpp-eval: timezone
