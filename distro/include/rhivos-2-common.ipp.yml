# RHIVOS 2 common settings
# RHIVOS 2
version: '2'
mpp-vars:
  distro_name: RHIVOS
  distro_version: 2
  # distro_baseurl can be provided via parameters to a-i-b, otherwise RHSM is used
  distro_baseurl: ""
  distro_baseurl_repo: $distro_baseurl/RHIVOS/$arch/os/
  distro_chroot: centos-stream-10-$arch
  uefi_vendor: redhat
  release_rpm: redhat-release
  selinux_policy: automotive
  rpmdb_in_usr: true
  distro_root_dir:
    mpp-if: distro_baseurl
    then: ""
    else: "/"
  distro_enabled_repo_ids:
    mpp-if: distro_baseurl
    then: []
    else:
      - $rhivos_rpms_id
      - $rhivos_debug_rpms_id
  distro_repos:
    - mpp-if: distro_baseurl
      then:
        id: rhivos
        baseurl: $distro_baseurl_repo
        priority: 10
      else:
        id: $rhivos_rpms_id
        system-repo: true
        rhsm: $use_rhsm
  distro_devel_repos:
    - mpp-if: distro_baseurl
      then:
        id: rhivos-source
        baseurl: $distro_baseurl/RHIVOS/source/tree/
        priority: 10
      else:
        id: $rhivos_source_rpms_id
        system-repo: true
        rhsm: $use_rhsm
  distro_debug_repos:
    - mpp-if: distro_baseurl
      then:
        id: rhivos-debug
        baseurl: $distro_baseurl/RHIVOS/$arch/debug/tree/
        priority: 10
      else:
        id: $rhivos_debug_rpms_id
        system-repo: true
        rhsm: $use_rhsm
  distro_module_id: platform:el10
  distro_gpg_keys:
    mpp-format-string: |
      $redhat10_gpg_key
