# yaml-language-server: $schema=https://centos.gitlab.io/automotive/src/automotive-image-builder/manifest_schema.yml
# This container has the packages needed for bootc-image-builder to work and
# is supposed to be used with the --build-container argument
name: bootc-builder

content:
  rpms:
    - bootc
    - dnf # needed for bootc-image-builder to generate manifest
    - dosfstools # mkfs.fat needed for bc-i-b
    - e2fsprogs # mkfs.ext4 needed for bc-i-b
    - bootupd # needed for bootc
    # TODO-BOOTC: We need this, or bootc-image-builder breaks on "Installing static GRUB configs"
    - grub2
    - aboot-deploy # Needed if aboot is enabled
    - aboot-update
    - systemd-ukify
    - systemd-boot


experimental:
  internal_defines:
    simple_enable_weak_deps: true
