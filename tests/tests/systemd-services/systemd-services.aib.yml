# yaml-language-server: $schema=https://centos.gitlab.io/automotive/src/automotive-image-builder/manifest_schema.yml
name: systemd_services
content:
  rpms:
    - httpd
    - kdump-utils
    - openssh-server
  systemd:
    enabled_services:
      - sshd.service
    disabled_services:
      - httpd.service
    masked_services:
      - kdump.service

qm:
  content:
    rpms:
      - chrony
      - cronie
      - cups
    systemd:
      enabled_services:
        - crond.service
      disabled_services:
        - cups.service
      masked_services:
        - chronyd.service
