# yaml-language-server: $schema=https://centos.gitlab.io/automotive/src/automotive-image-builder/manifest_schema.yml
name: sysboot-test

content:
  rpms:
    - httpd

image:
  boot_checks:
    commands:
      - name: success
        cmd: "/usr/bin/true"
      - name: check-network
        cmd: "/usr/bin/ping -c1 localhost"
    systemd:
      - httpd.service
