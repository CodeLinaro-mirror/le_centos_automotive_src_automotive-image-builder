# yaml-language-server: $schema=https://centos.gitlab.io/automotive/src/automotive-image-builder/manifest_schema.yml
name: install_rpms
content:
  rpms:
    - strace
    - coreutils-debuginfo
    - htop
  enable_repos:
    - debug
  repos:
    - id: epel
      metalink: https://mirrors.fedoraproject.org/metalink?repo=epel-10&arch=$arch

qm:
  content:
    rpms:
      - less
      - rpm-debuginfo
      - readline7
    enable_repos:
      - debug
    repos:
      - id: epel
        metalink: https://mirrors.fedoraproject.org/metalink?repo=epel-10&arch=$arch
